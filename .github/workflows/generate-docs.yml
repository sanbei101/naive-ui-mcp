name: Generate Naive UI Docs

on:
  push:
    branches:
      - main
    paths-ignore:
      - "references"
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-docs:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Clone naive-ui
        run: git clone --depth 1 https://github.com/tusen-ai/naive-ui.git naive

      - name: Extract docs
        run: npx tsx scripts/extract-docs.ts ./naive ./docs-output

      - name: Run tests
        run: npx vitest run

      - name: Generate README for doc branch
        run: |
          cat > ./docs-output/README.md << 'EOF'
          # Naive UI 中文文档
          本分支包含从 [naive-ui](https://github.com/tusen-ai/naive-ui) 自动提取的中文文档。

          ## 目录结构
          ```
          <component>/
          ├── api.md    # API 文档
          └── demo.md   # 示例代码
          ```
          ## 更新频率
          每天自动更新
          EOF

      - name: Deploy to doc branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs-output
          publish_branch: doc
          force_orphan: true
          enable_jekyll: true
